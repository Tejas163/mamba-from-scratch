# Show answers
show_answers = True

# Cell timeout
timeout = 600

# Quality metrics
quality_metrics = all

# Test timeout
test_timeout = 300

# Use ruff
use_ruff = True

# Pin dependencies
requirements = torch numpy matplotlib

# Exclude patterns
exclude = '.git','.github','__pycache__','*.pyc','docs'

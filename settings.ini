# Notebook Metadata

[DEFAULT]
# Project name
repo_name = mamba-from-scratch

# Python package name
lib_name = mamba_ssm

# Your GitHub user name
user = yourusername

# Description
description = Build Mamba SSM from scratch - educational implementation

# Author name
author = Educational

# Author email
author_email = 

# Min Python version
min_python = 3.8

# License
license = MIT

# GitHub URL
git_url = https://github.com/yourusername/mamba-from-scratch/

# Base URL
doc_url = https://yourusername.github.io/mamba-from-scratch/

# Notebook path
nbs_path = nbs

# Library path
